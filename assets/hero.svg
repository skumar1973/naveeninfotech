<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a3d62;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f2027;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#29b6f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1e88e5;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#heroGradient)"/>
  
  <!-- Decorative circles in background -->
  <circle cx="200" cy="200" r="150" fill="url(#glowGradient)" opacity="0.5"/>
  <circle cx="1700" cy="900" r="200" fill="url(#glowGradient)" opacity="0.4"/>
  
  <!-- Left side: Logo/Icon -->
  <g transform="translate(150, 250)">
    <!-- Large circle background -->
    <circle cx="200" cy="200" r="180" fill="none" stroke="url(#accentGradient)" stroke-width="4" opacity="0.8"/>
    
    <!-- Nested curves -->
    <path d="M 80 280 Q 200 150 320 280" fill="none" stroke="url(#accentGradient)" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
    <path d="M 100 260 Q 200 170 300 260" fill="none" stroke="url(#accentGradient)" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Central circle -->
    <circle cx="200" cy="220" r="30" fill="url(#accentGradient)"/>
    
    <!-- Indian Rupees symbol -->
    <text x="200" y="235" font-family="Arial, sans-serif" font-size="40" font-weight="bold" text-anchor="middle" fill="white">₹</text>
    
    <!-- Growth arrow -->
    <path d="M 200 100 L 240 150 M 240 150 L 200 160 M 240 150 L 220 100" fill="none" stroke="url(#accentGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>
  
  <!-- Right side: Text content -->
  <g transform="translate(650, 300)">
    <!-- Main heading -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">Wealthnestpro</text>
    
    <!-- Tagline -->
    <text x="0" y="100" font-family="Arial, sans-serif" font-size="32" fill="url(#accentGradient)">Secure Your Financial Future</text>
    
    <!-- Description -->
    <text x="0" y="180" font-family="Arial, sans-serif" font-size="20" fill="#b0c4de" font-weight="300">
      <tspan x="0" y="180">Expert wealth management and investment strategies</tspan>
      <tspan x="0" y="220">tailored to your unique financial goals</tspan>
    </text>
    
    <!-- CTA Button background -->
    <rect x="0" y="280" width="280" height="60" rx="30" fill="url(#accentGradient)" opacity="0.9"/>
    
    <!-- CTA Button text -->
    <text x="140" y="320" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Get Started Today</text>
  </g>
  
  <!-- Decorative elements - bottom -->
  <g opacity="0.3">
    <path d="M 0 900 Q 480 850 960 900 T 1920 900" stroke="url(#accentGradient)" stroke-width="3" fill="none"/>
    <path d="M 0 950 Q 480 930 960 950 T 1920 950" stroke="url(#accentGradient)" stroke-width="2" fill="none" opacity="0.5"/>
  </g>
  
  <!-- Trust badges - bottom right -->
  <g transform="translate(1400, 850)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="14" fill="#b0c4de">✓ Trusted by 1000+ Clients</text>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="14" fill="#b0c4de">✓ 15+ Years Experience</text>
    <text x="0" y="70" font-family="Arial, sans-serif" font-size="14" fill="#b0c4de">✓ Fiduciary Certified</text>
  </g>
</svg>
