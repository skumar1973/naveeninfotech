<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wealthnestpro.in - Inquiry</title>
  <meta name="description" content="Send an inquiry to Wealthnestpro.in — tell us about your financial goals and we'll respond with a personalised plan.">
  <link rel="canonical" href="https://wealthnestpro.in/inquiry.html">
  <link rel="stylesheet" href="css/styles.css">

  <!-- Open Graph / Social -->
  <meta property="og:title" content="Inquiry — Wealthnestpro.in">
  <meta property="og:description" content="Tell us about your financial goals and we'll respond with a personalised plan.">
  <meta property="og:url" content="https://wealthnestpro.in/inquiry.html">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://wealthnestpro.in/assets/hero.svg">
  <meta name="twitter:card" content="summary_large_image">

  <!-- JSON-LD for ContactPage (inquiry) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ContactPage",
  "url": "https://wealthnestpro.in/inquiry.html",
    "headline": "Inquiry — Wealthnestpro.in",
    "description": "Send an inquiry to Wealthnestpro.in and we'll respond with a personalised plan."
  }
  </script>
    <script src="https://cdn.tailwindcss.com"></script>
  <!-- <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> -->
  <script>
  tailwind.config = {
      darkMode:'class'
  }
  </script>
</head>
<body class="bg-white text-gray-800 dark:bg-gray-900 dark:text-white transition duration-300">
  <button id="theme-toggle" class="border rounded-lg px-3 py-2">🌙</button>
  <div id="site-header"></div>
  <main class="container">
    <h1>Inquiry</h1>
    <p>Please fill out the form below and we'll get back to you shortly.</p>

    <form id="inquiryForm" class="form" novalidate>
      <div class="form-row">
        <label for="firstName">First name</label>
        <input type="text" id="firstName" name="firstName" required>
      </div>

      <div class="form-row">
        <label for="lastName">Last name</label>
        <input type="text" id="lastName" name="lastName" required>
      </div>

      <div class="form-row">
        <label for="mobile">Mobile</label>
        <input type="tel" id="mobile" name="mobile" required pattern="[0-9+\- ()]{7,}">
      </div>

      <div class="form-row">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-row">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>
      </div>

      <div class="form-row">
        <button type="submit" id="sendBtn" class="btn">Send</button>
      </div>

      <div id="formStatus" role="status" aria-live="polite" class="form-status"></div>
    </form>
  </main>

  <div id="site-footer"></div>

  <script src="js/main.js"></script>
</body>
</html>
