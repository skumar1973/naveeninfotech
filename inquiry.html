<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Wealthnestpro.in - Inquiry</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav container">
  <a class="brand" href="index.html"><img src="assets/logo.svg" alt="Wealthnestpro.in logo">Wealthnestpro.in</a>
      <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="inquiry.html" aria-current="page">Inquiry</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <h1>Inquiry</h1>
    <p>Please fill out the form below and we'll get back to you shortly.</p>

    <form id="inquiryForm" class="form" novalidate>
      <div class="form-row">
        <label for="firstName">First name</label>
        <input type="text" id="firstName" name="firstName" required>
      </div>

      <div class="form-row">
        <label for="lastName">Last name</label>
        <input type="text" id="lastName" name="lastName" required>
      </div>

      <div class="form-row">
        <label for="mobile">Mobile</label>
        <input type="tel" id="mobile" name="mobile" required pattern="[0-9+\- ()]{7,}">
      </div>

      <div class="form-row">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-row">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" required></textarea>
      </div>

      <div class="form-row">
        <button type="submit" id="sendBtn" class="btn">Send</button>
      </div>

      <div id="formStatus" role="status" aria-live="polite" class="form-status"></div>
    </form>
  </main>

  <footer class="site-footer container">
    <p>&copy; <span id="year"></span> Wealthnestpro.in. All rights reserved.</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
